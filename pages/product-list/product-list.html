<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DEUX - Thời trang nam nữ cao cấp hiện đại" />
    <title>DEUX | Sản Phẩm</title>
    <link rel="icon" href="/assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/assets/style.css" />
    <!-- CSS riêng cho trang danh sách sản phẩm -->
    <link rel="stylesheet" href="product-list.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
</head>

<body>

    <!--  header được chèn bởi components.js  -->
    <header></header>

    <!-- Thanh điều hướng phụ và tìm kiếm + sắp xếp -->
    <section class="pl-filter-bar">
        <div class="container pl-filter-bar-inner">

            <!-- Hiển thị bộ lọc đang áp dụng (VD: Tất cả > Áo)
                 Được cập nhật động bởi hàm updateBreadcrumb() trong product-list.js -->
            <div class="pl-breadcrumb" id="plBreadcrumb">
                <!-- Mặc định chỉ hiện "Tất cả sản phẩm", JS sẽ thêm khi có lọc -->
                <span class="pl-breadcrumb-item pl-breadcrumb-item-home" id="plBreadcrumbHome">
                    <i class="fa-solid fa-house"></i> Tất cả sản phẩm
                </span>
            </div>

            <!-- nút tìm kiếm + sắp xếp -->
            <div class="pl-controls">

                <!-- Ô tìm kiếm: sự kiện "input" gắn trong product-list.js -->
                <div class="pl-search">
                    <i class="fa-solid fa-magnifying-glass pl-search-icon"></i>
                    <input type="text" id="plSearch" class="input-field pl-search-input"
                        placeholder="Tìm sản phẩm..." />
                </div>

                <!-- Dropdown sắp xếp: sự kiện "change" gắn trong product-list.js -->
                <select id="plSort" class="input-field pl-sort">
                    <option value="">Sắp xếp</option>
                    <option value="asc">Giá tăng dần</option>
                    <option value="desc">Giá giảm dần</option>
                    <option value="name">Tên A–Z</option>
                </select>
            </div>

        </div>
    </section>

    <!-- Thanh lọc theo danh mục được tạo bởi renderCategoryBar() trong product-list.js -->
    <div class="pl-cat-bar" id="plCatBar"></div>

    <!-- Khu vực hiển thị các card sản phẩm -->
    <main class="product">
        <div class="container">

            <!-- Hiển thị số lượng kết quả: Được cập nhật bởi hàm renderList() trong product-list.js -->
            <p class="pl-result-count" id="plResultCount"></p>

            <!-- Grid chứa các card sản phẩm
                hiển thị placeholder trong lúc chờ JS load 
                skeleton bị xóa và card thật được chèn vào -->
            <div class="pl-grid" id="productGrid">
                <!-- 8 placeholder skeleton để giữ layout trong khi tải dữ liệu -->
                <div class="pl-skeleton"></div>
                <div class="pl-skeleton"></div>
                <div class="pl-skeleton"></div>
                <div class="pl-skeleton"></div>
                <div class="pl-skeleton"></div>
                <div class="pl-skeleton"></div>
                <div class="pl-skeleton"></div>
                <div class="pl-skeleton"></div>
            </div>
        </div>
    </main>

    <!--  footer được chèn bởi components.js)  -->
    <footer></footer>

    <!--                   Javascript
        1. main.js: logic chung
        2. components.js chèn header/footer
        3. product-list.js: render grid, filter, search -->
    <script src="/assets/main.js"></script>
    <script src="/assets/components.js"></script>
    <script src="product-list.js"></script>
</body>

</html>
