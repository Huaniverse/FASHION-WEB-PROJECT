<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm | DEUX</title>
    <link rel="icon" href="/assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/assets/style.css">
    <link rel="stylesheet" href="product-detail.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <!--  header được chèn bởi components.js  -->
    <header></header>

    <!--  nội dung chính trang chi tiết sản phẩm  -->
    <main class="page-wrapper product-detail-section">
        <div class="container">
            <!-- Layout 2 cột: gallery ảnh bên trái, thông tin bên phải -->
            <div class="product-layout">

                <!--  cột trái: gallery ảnh sản phẩm  -->
                <div class="product-gallery">

                    <!-- Vùng ảnh chính với nút điều hướng -->
                    <div class="main-image-container">

                        <!-- Nút "Previous": lùi về ảnh trước -->
                        <button class="slider-btn prev-btn hidden" id="prevImageBtn">
                            <i class="fas fa-chevron-left"></i>
                        </button>

                        <!-- Ảnh sản phẩm chính: src và alt được gán bởi product-detail.js -->
                        <img id="productImage" src="" alt="Sản phẩm">

                        <!-- Nút "Next": sang ảnh tiếp theo -->
                        <button class="slider-btn next-btn hidden" id="nextImageBtn">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>

                    <!-- Gallery thumbnail (ảnh nhỏ bên dưới):
                         Được render động bởi product-detail.js từ product.images[] -->
                    <div class="thumbnail-gallery" id="thumbnailGallery"></div>
                </div>

                <!-- Cột phải: thông tin và tương tác -->
                <div class="product-info">

                    <!-- Tên sản phẩm: "Đang tải..." là placeholder, được cập nhật bởi JS -->
                    <h1 id="productName" class="section-title">Đang tải...</h1>

                    <!-- Giá sản phẩm -->
                    <p class="detail-price" id="productPrice">0đ</p>

                    <!-- Đường kẻ ngang phân cách giá và mô tả -->
                    <div class="divider"></div>

                    <!-- Mô tả sản phẩm -->
                    <p class="detail-description" id="productDescription"></p>

                    <!-- ── Chọn kích cỡ ── -->
                    <div class="selection-group">
                        <h4>Kích cỡ</h4>
                        <!-- Các nút size mặc định (S,M,L,XL) → được thay thế bởi JS
                             theo product.sizes[] thực tế. M là active mặc định -->
                        <div class="size-picker">
                            <button class="size-btn">S</button>
                            <button class="size-btn active">M</button>
                            <button class="size-btn">L</button>
                            <button class="size-btn">XL</button>
                        </div>
                    </div>

                    <!-- ── Chọn số lượng ── -->
                    <div class="selection-group">
                        <h4>Số lượng</h4>
                        <!-- Bộ điều chỉnh số lượng: nút trừ, giá trị hiện tại, nút cộng -->
                        <div class="qty-control">
                            <button id="btn-minus"><i class="fas fa-minus"></i></button>
                            <!-- Giá trị số lượng: mặc định 1, được cập nhật bởi JS -->
                            <span id="quantity-val">1</span>
                            <button id="btn-plus"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>

                    <!-- Nút thêm vào giỏ hàng: click handler gắn trong product-detail.js -->
                    <button id="addToCart" class="btn btn-primary btn-add" style="padding: 18px; font-size: 16px;">
                        <i class="fas fa-cart-plus"></i> THÊM VÀO GIỎ HÀNG
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!--  footer được chèn bởi components.js  -->
    <footer></footer>

    <!--  JavaScript  -->
    <script src="/assets/main.js"></script>
    <script src="/assets/components.js"></script>
    <script src="product-detail.js"></script>
</body>

</html>
